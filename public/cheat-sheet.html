<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RIQ 21 — Cheat Sheet</title>
<link rel="icon" href="data:," />
<style>
  :root { --bg:#1a1612; --panel:#2a241e; --border:#3d3528; --text:#f0ebe2; --muted:#a09486; --accent:#f4a738; --green:#10b981; --yellow:#f59e0b; --red:#ef4444; --purple:#a78bfa; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; min-height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; background: var(--bg); color: var(--text); }
  header { background: var(--panel); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
  header h1 { margin: 0; font-size: 18px; font-weight: 600; }
  header .links a { color: var(--muted); margin-left: 11px; text-decoration: none; font-size: 12px; }
  header .links a.active { color: var(--accent); font-weight: 600; }
  main { padding: 24px; max-width: 1500px; margin: 0 auto; }
  .top-controls { display: flex; gap: 10px; align-items: center; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 14px 18px; margin-bottom: 18px; }
  .tab-row { display: flex; gap: 4px; }
  .tab { padding: 6px 14px; font-size: 13px; cursor: pointer; color: var(--muted); border: 1px solid var(--border); border-radius: 6px; background: transparent; user-select: none; }
  .tab.active { color: var(--accent); border-color: var(--accent); background: #342c23; font-weight: 600; }
  #search { flex: 1; background: #342c23; color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 8px 14px; font-size: 14px; }
  .layout { display: grid; grid-template-columns: 280px 1fr; gap: 16px; align-items: start; }
  @media (max-width: 1000px) { .layout { grid-template-columns: 1fr; } }
  .list { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 8px; max-height: 80vh; overflow-y: auto; }
  .list-item { padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; }
  .list-item:hover { background: #342c23; }
  .list-item.active { background: #342c23; border-left: 3px solid var(--accent); padding-left: 9px; }
  .list-item .sub { color: var(--muted); font-size: 11px; margin-top: 2px; }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 20px 24px; margin-bottom: 16px; }
  .panel h2 { margin: 0 0 12px; font-size: 16px; color: var(--accent); }
  .panel .sub { color: var(--muted); font-size: 12px; margin-top: -8px; margin-bottom: 14px; }
  .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin-bottom: 16px; }
  .kpi { background: #342c23; border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; }
  .kpi .l { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .kpi .v { font-size: 22px; font-weight: 700; color: var(--accent); margin-top: 4px; font-variant-numeric: tabular-nums; }
  .kpi .delta { font-size: 11px; margin-top: 2px; }
  .kpi .delta.good { color: var(--green); }
  .kpi .delta.bad { color: var(--red); }
  .kpi .n { font-size: 10px; color: var(--muted); margin-top: 2px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; color: var(--muted); font-weight: 500; font-size: 11px; text-transform: uppercase; padding: 6px; border-bottom: 1px solid var(--border); }
  td { padding: 5px 6px; border-bottom: 1px solid #342c23; }
  .num { text-align: right; font-variant-numeric: tabular-nums; }
  .money { color: var(--green); }
  .pct.good { color: var(--green); }
  .pct.bad { color: var(--red); }
  .pct.neutral { color: var(--accent); }
  .delta-pp { font-size: 10px; padding: 1px 5px; border-radius: 3px; }
  .delta-pp.up { background: rgba(16,185,129,0.15); color: var(--green); }
  .delta-pp.down { background: rgba(239,68,68,0.15); color: var(--red); }
  .delta-pp.flat { background: #342c23; color: var(--muted); }
  .pill { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 10px; }
  .pill.lenient { background: rgba(16,185,129,0.15); color: var(--green); }
  .pill.strict { background: rgba(239,68,68,0.15); color: var(--red); }
  .pill.baseline { background: #342c23; color: var(--muted); }
  .insufficient { font-size: 11px; color: var(--muted); font-style: italic; }
  .law { background: rgba(168,139,250,0.08); border-left: 3px solid var(--purple); padding: 10px 14px; font-size: 12px; line-height: 1.5; border-radius: 0 6px 6px 0; }
  .loading { padding: 60px; text-align: center; color: var(--accent); }
  .method { color: var(--muted); font-size: 11px; line-height: 1.5; padding: 12px 14px; background: #342c23; border-left: 3px solid var(--accent); border-radius: 0 4px 4px 0; margin-bottom: 14px; }
  .method code { color: var(--accent); background: transparent; padding: 0 2px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<header>
  <h1>🎓 Cheat Sheet</h1>
  <div class="links">
    <a href="index.html">🏠 Dashboard</a>
    <a href="predictor.html">Predictor</a>
    <a href="field-guide.html">Field Guide</a>
    <a href="lead-score.html">Lead Score</a>
    <a href="cheat-sheet.html" class="active">Cheat Sheet</a>
  </div>
</header>
<main>
  <div class="top-controls">
    <div class="tab-row" id="tabs">
      <button class="tab active" data-t="rep">Reps</button>
      <button class="tab" data-t="carrier">Carriers</button>
      <button class="tab" data-t="adjuster">Adjusters</button>
      <button class="tab" data-t="state">States</button>
      <button class="tab" data-t="zip">ZIPs</button>
    </div>
    <input id="search" placeholder="Search by name…" />
  </div>
  <div id="loading" class="loading">Loading cheat sheets…</div>
  <div class="layout" id="content" style="display:none">
    <div class="list" id="list"></div>
    <div id="detail"><div class="panel"><div class="sub">Pick an entry on the left.</div></div></div>
  </div>
</main>

<script src="/riq-links.js"></script>
<script>
const $ = (id) => document.getElementById(id);
const fmt = {
  money: (v) => v == null || v === 0 ? '—' : (v >= 1e6 ? '$' + (v / 1e6).toFixed(2) + 'M' : v >= 1e3 ? '$' + Math.round(v / 1e3) + 'k' : '$' + Math.round(v).toLocaleString()),
  moneyFull: (v) => v == null || v === 0 ? '—' : '$' + Math.round(v).toLocaleString(),
  int: (v) => v == null ? '—' : v.toLocaleString(),
  pct: (v, digits = 1) => v == null ? '—' : (v * 100).toFixed(digits) + '%',
  pp: (v) => v == null ? '' : (v > 0 ? '+' : '') + (v * 100).toFixed(1) + 'pp',
};
function pctClass(v) {
  if (v == null) return 'neutral';
  if (v >= 0.75) return 'good';
  if (v < 0.5) return 'bad';
  return 'neutral';
}
function deltaClass(v) {
  if (v == null || Math.abs(v) < 0.01) return 'flat';
  return v > 0 ? 'up' : 'down';
}

let DATA;
let activeTab = 'rep';
let activeEntity = null;

async function load() {
  const r = await fetch('/api/intel/cheat-sheets');
  if (!r.ok) throw new Error('Load failed ' + r.status);
  DATA = await r.json();
  $('loading').style.display = 'none';
  $('content').style.display = 'grid';
  // URL deep-link
  const params = new URLSearchParams(location.search);
  const t = params.get('type'); const n = params.get('name');
  if (t && ['rep', 'carrier', 'adjuster', 'state', 'zip'].includes(t)) {
    activeTab = t;
    document.querySelectorAll('.tab').forEach((b) => b.classList.toggle('active', b.dataset.t === t));
  }
  if (n) activeEntity = n;
  renderList();
  $('search').addEventListener('input', () => { clearTimeout(window._t); window._t = setTimeout(renderList, 150); });
  document.querySelectorAll('.tab').forEach((b) => b.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach((x) => x.classList.remove('active'));
    b.classList.add('active');
    activeTab = b.dataset.t;
    activeEntity = null;
    $('search').value = '';
    renderList();
  }));
}

function listForTab() {
  if (activeTab === 'rep') return DATA.reps.map((r) => ({ key: r.name, label: r.name, sub: `${r.totals.insSigned} ins jobs · ${fmt.money(r.totals.combinedSignedTotal)}`, ref: r }));
  if (activeTab === 'carrier') return DATA.carriers.map((c) => ({ key: c.name, label: c.name, sub: `${c.totals.jobs} jobs · ${fmt.pct(c.totals.approvalRate)} approval`, ref: c }));
  if (activeTab === 'adjuster') return DATA.adjusters.map((a) => ({ key: a.name + '|' + a.carrier, label: a.name, sub: `${a.carrier} · ${a.jobs} jobs · ${fmt.pct(a.approvalRate)} approval`, ref: a }));
  if (activeTab === 'state') return DATA.states.map((s) => ({ key: s.state, label: s.state, sub: `${s.insJobs} ins jobs · ${fmt.pct(s.insApprovalRate)} approval`, ref: s }));
  if (activeTab === 'zip') return DATA.zips.map((z) => ({ key: z.zip, label: z.zip + (z.city ? ` · ${z.city}` : ''), sub: `${z.insJobs} ins jobs · ${fmt.pct(z.insApprovalRate)} approval`, ref: z }));
  return [];
}

function renderList() {
  const q = ($('search').value || '').trim().toLowerCase();
  let items = listForTab();
  if (q) items = items.filter((i) => i.label.toLowerCase().includes(q) || i.sub.toLowerCase().includes(q));
  $('list').innerHTML = items.slice(0, 300).map((i) => `
    <div class="list-item${activeEntity === i.key ? ' active' : ''}" data-k="${encodeURIComponent(i.key)}">
      <div>${i.label}</div>
      <div class="sub">${i.sub}</div>
    </div>
  `).join('');
  $('list').querySelectorAll('.list-item').forEach((el) => el.addEventListener('click', () => {
    activeEntity = decodeURIComponent(el.dataset.k);
    document.querySelectorAll('.list-item').forEach((x) => x.classList.remove('active'));
    el.classList.add('active');
    renderDetail();
  }));
  if (!activeEntity && items.length) {
    activeEntity = items[0].key;
    $('list').querySelector('.list-item')?.classList.add('active');
  }
  renderDetail();
}

function renderDetail() {
  const all = listForTab();
  const item = all.find((i) => i.key === activeEntity);
  if (!item) { $('detail').innerHTML = '<div class="panel"><div class="sub">Pick an entry.</div></div>'; return; }
  if (activeTab === 'rep') $('detail').innerHTML = renderRep(item.ref);
  else if (activeTab === 'carrier') $('detail').innerHTML = renderCarrier(item.ref);
  else if (activeTab === 'adjuster') $('detail').innerHTML = renderAdjuster(item.ref);
  else if (activeTab === 'state') $('detail').innerHTML = renderState(item.ref);
  else if (activeTab === 'zip') $('detail').innerHTML = renderZip(item.ref);
}

function deltaPp(v) {
  if (v == null) return '';
  const cls = deltaClass(v);
  return `<span class="delta-pp ${cls}">${fmt.pp(v)}</span>`;
}

function renderRep(r) {
  const t = r.totals;
  const teamBaseline = DATA.team.insApprovalRate;
  const speed = r.speed;
  return `
    <div class="panel">
      <h2>${r.name}</h2>
      <div class="sub">${t.insSigned.toLocaleString()} insurance signed · ${t.retailSigned.toLocaleString()} retail signed · sorted by total sales</div>
      <div class="method">
        Math source: signed jobs from <code>projects.json</code>, filtered by <code>salesRep.trim() === '${r.name}'</code>.
        Insurance Sales = SUM(<code>insuranceTotal</code>) on signed Insurance/Insurance Conversion/Public Adjuster jobs.
        Retail Sales = SUM(<code>currentJobTotal</code>) on signed Retail jobs. Same fields as portal Sales Report CSV.
      </div>
      <div class="kpi-row">
        <div class="kpi">
          <div class="l">Insurance Sales</div>
          <div class="v">${fmt.moneyFull(t.insTotal)}</div>
          <div class="n">across ${t.insSigned} signed jobs</div>
        </div>
        <div class="kpi">
          <div class="l">Retail Sales</div>
          <div class="v">${fmt.moneyFull(t.retailTotal)}</div>
          <div class="n">across ${t.retailSigned} signed jobs</div>
        </div>
        <div class="kpi">
          <div class="l">Approval rate (Ins)</div>
          <div class="v"><span class="pct ${pctClass(t.insApprovalRate)}">${fmt.pct(t.insApprovalRate)}</span></div>
          <div class="delta ${r.cohortDelta.approvalRate > 0 ? 'good' : 'bad'}">${fmt.pp(r.cohortDelta.approvalRate)} vs team ${fmt.pct(teamBaseline)}</div>
          <div class="n">${t.insApproved} approved of ${t.insSigned - t.insDead} (excl. ${t.insDead} dead)</div>
        </div>
        <div class="kpi">
          <div class="l">Speed loss→sign</div>
          <div class="v">${speed.medianDaysLossToSign ?? '—'}<span style="font-size:13px"> d</span></div>
          <div class="delta ${r.cohortDelta.medianDaysLossToSign != null && r.cohortDelta.medianDaysLossToSign < 0 ? 'good' : 'bad'}">${r.cohortDelta.medianDaysLossToSign != null ? (r.cohortDelta.medianDaysLossToSign > 0 ? '+' : '') + r.cohortDelta.medianDaysLossToSign + 'd' : ''} vs team ${DATA.team.medianDaysLossToSign}d</div>
        </div>
        <div class="kpi">
          <div class="l">Speed sign→complete</div>
          <div class="v">${speed.medianDaysSignToComplete ?? '—'}<span style="font-size:13px"> d</span></div>
          <div class="delta ${r.cohortDelta.medianDaysSignToComplete != null && r.cohortDelta.medianDaysSignToComplete < 0 ? 'good' : 'bad'}">${r.cohortDelta.medianDaysSignToComplete != null ? (r.cohortDelta.medianDaysSignToComplete > 0 ? '+' : '') + r.cohortDelta.medianDaysSignToComplete + 'd' : ''} vs team ${DATA.team.medianDaysSignToComplete}d</div>
        </div>
      </div>
    </div>

    <div class="panel">
      <h2>🎯 By Carrier <span class="sub" style="font-size:11px">${r.byCarrier.length} carriers worked</span></h2>
      <table>
        <thead><tr><th>Carrier</th><th class="num">Jobs</th><th class="num">Approved</th><th class="num">Approval</th><th class="num">vs Their Avg</th><th class="num">Avg Approved $</th></tr></thead>
        <tbody>${r.byCarrier.slice(0, 25).map((c) => `
          <tr>
            <td><a class="riq-link" href="carrier-detail.html?name=${encodeURIComponent(c.carrier)}">${c.carrier}</a></td>
            <td class="num">${c.jobs}</td>
            <td class="num">${c.approved}</td>
            <td class="num"><span class="pct ${pctClass(c.approvalRate)}">${fmt.pct(c.approvalRate)}</span></td>
            <td class="num">${c.jobs < DATA.team.minN ? '<span class="insufficient">N<' + DATA.team.minN + '</span>' : deltaPp(c.deltaVsRepBaseline)}</td>
            <td class="num money">${fmt.money(c.avgApprovedJob)}</td>
          </tr>
        `).join('')}</tbody>
      </table>
    </div>

    ${r.bestCarrier && r.worstCarrier ? `
    <div class="grid-2">
      <div class="panel">
        <h2 style="color:var(--green)">🌟 Best carrier (vs your baseline)</h2>
        <div style="font-size:20px;font-weight:700">${r.bestCarrier.carrier}</div>
        <div class="sub" style="margin-top:6px">${fmt.pct(r.bestCarrier.approvalRate)} approval · ${r.bestCarrier.jobs} jobs · ${deltaPp(r.bestCarrier.deltaPp)} above your baseline</div>
      </div>
      <div class="panel">
        <h2 style="color:var(--red)">⚠ Toughest carrier (vs your baseline)</h2>
        <div style="font-size:20px;font-weight:700">${r.worstCarrier.carrier}</div>
        <div class="sub" style="margin-top:6px">${fmt.pct(r.worstCarrier.approvalRate)} approval · ${r.worstCarrier.jobs} jobs · ${deltaPp(r.worstCarrier.deltaPp)} below your baseline</div>
      </div>
    </div>` : ''}

    <div class="panel">
      <h2>🤝 Adjuster Relationships <span class="sub" style="font-size:11px">${r.byAdjuster.length} adjusters with 2+ jobs together</span></h2>
      <table>
        <thead><tr><th>Adjuster</th><th>Carrier</th><th class="num">Jobs</th><th class="num">Approval</th><th class="num">vs You</th></tr></thead>
        <tbody>${r.byAdjuster.slice(0, 20).map((a) => `
          <tr>
            <td><a class="riq-link" href="adjuster-detail.html?name=${encodeURIComponent(a.name)}">${a.name}</a></td>
            <td>${a.carrier}</td>
            <td class="num">${a.jobs}</td>
            <td class="num"><span class="pct ${pctClass(a.approvalRate)}">${fmt.pct(a.approvalRate)}</span></td>
            <td class="num">${a.jobs < 3 ? '<span class="insufficient">N&lt;3</span>' : deltaPp(a.deltaVsRepBaseline)}</td>
          </tr>
        `).join('') || '<tr><td colspan="5" class="insufficient">No adjuster matches (need 2+ jobs with the same adjuster)</td></tr>'}</tbody>
      </table>
    </div>

    <div class="grid-2">
      <div class="panel">
        <h2>📍 Top ZIPs</h2>
        <table>
          <thead><tr><th>ZIP</th><th>City</th><th class="num">Jobs</th><th class="num">Revenue</th></tr></thead>
          <tbody>${r.byZip.slice(0, 10).map((z) => `
            <tr><td>${z.zip}</td><td>${z.city}</td><td class="num">${z.jobs}</td><td class="num money">${fmt.money(z.revenue)}</td></tr>
          `).join('')}</tbody>
        </table>
      </div>
      <div class="panel">
        <h2>🌪 Top Storms-of-Record</h2>
        <table>
          <thead><tr><th>Date</th><th>Type</th><th>Mag</th><th class="num">Jobs Signed</th></tr></thead>
          <tbody>${r.topStorms.map((s) => `
            <tr><td>${(s.date || '').slice(0, 10)}</td><td>${s.type}</td><td>${s.mag || '—'}</td><td class="num">${s.jobs}</td></tr>
          `).join('') || '<tr><td colspan="4" class="insufficient">No storm-correlated jobs</td></tr>'}</tbody>
        </table>
      </div>
    </div>

    <div class="panel">
      <h2>🏗 Trade Mix</h2>
      <table>
        <thead><tr><th>Trade</th><th class="num">Jobs</th><th class="num">Approved</th><th class="num">%</th></tr></thead>
        <tbody>${r.byTrade.slice(0, 12).map((t) => `
          <tr><td>${t.trade}</td><td class="num">${t.jobs}</td><td class="num">${t.approved}</td><td class="num"><span class="pct ${pctClass(t.approvalRate)}">${fmt.pct(t.approvalRate)}</span></td></tr>
        `).join('')}</tbody>
      </table>
    </div>
  `;
}

function renderCarrier(c) {
  return `
    <div class="panel">
      <h2>${c.name}</h2>
      <div class="sub">${c.totals.jobs.toLocaleString()} signed insurance jobs · ${fmt.pct(c.totals.approvalRate)} approval rate</div>
      <div class="method">
        Math source: <code>projects.json</code> filtered to signed jobs where <code>insurance === '${c.name}'</code> AND <code>jobType ∈ {Insurance, Insurance Conversion, Public Adjuster}</code>.
        Approval rate = approved / (signed − dead). Uplift = (revisedEstimate − initialEstimate) / initialEstimate.
      </div>
      <div class="kpi-row">
        <div class="kpi"><div class="l">Total insured $</div><div class="v">${fmt.moneyFull(c.totals.insTotal)}</div><div class="n">across ${c.totals.jobs} signed</div></div>
        <div class="kpi"><div class="l">Median deductible</div><div class="v">${c.medianDeductible != null ? '$' + c.medianDeductible.toLocaleString() : '—'}</div></div>
        <div class="kpi"><div class="l">Median insuranceTotal</div><div class="v">${fmt.money(c.medianInsuranceTotal)}</div></div>
        <div class="kpi"><div class="l">Median uplift</div><div class="v">${fmt.pct(c.medianUplift)}</div><div class="n">${(c.pctOver50Uplift * 100).toFixed(0)}% have >50% uplift</div></div>
        <div class="kpi"><div class="l">Median days loss→sign</div><div class="v">${c.medianDaysLossToSign ?? '—'}<span style="font-size:13px"> d</span></div></div>
        <div class="kpi"><div class="l">Median days sign→complete</div><div class="v">${c.medianDaysSignToComplete ?? '—'}<span style="font-size:13px"> d</span></div></div>
        <div class="kpi"><div class="l">Death rate</div><div class="v"><span class="pct ${c.deathRate > 0.3 ? 'bad' : 'neutral'}">${fmt.pct(c.deathRate)}</span></div><div class="n">${c.totals.dead} dead</div></div>
      </div>
    </div>

    <div class="panel">
      <h2>🌪 Hail-tier Sensitivity</h2>
      <div class="sub">Approval rate by hail magnitude at the property. Watch for the carrier's "denial valley" (often 1.25–1.5" where engineers get involved).</div>
      <table>
        <thead><tr><th>Hail tier</th><th class="num">Jobs</th><th class="num">Approved</th><th class="num">Approval rate</th></tr></thead>
        <tbody>${c.byHail.map((h) => `
          <tr><td>${h.tier}"</td><td class="num">${h.jobs}</td><td class="num">${h.approved}</td><td class="num"><span class="pct ${pctClass(h.approvalRate)}">${h.jobs < DATA.team.minN ? '<span class="insufficient">N<' + DATA.team.minN + '</span>' : fmt.pct(h.approvalRate)}</span></td></tr>
        `).join('') || '<tr><td colspan="4" class="insufficient">No hail-correlated jobs</td></tr>'}</tbody>
      </table>
    </div>

    <div class="grid-2">
      <div class="panel">
        <h2>🗺 By State</h2>
        <table>
          <thead><tr><th>State</th><th class="num">Jobs</th><th class="num">Approval</th><th class="num">Med deductible</th></tr></thead>
          <tbody>${c.byState.map((s) => `
            <tr><td><a class="riq-link" href="cheat-sheet.html?type=state&name=${s.state}">${s.state}</a></td><td class="num">${s.jobs}</td><td class="num"><span class="pct ${pctClass(s.approvalRate)}">${fmt.pct(s.approvalRate)}</span></td><td class="num">${s.medianDeductible ? '$' + s.medianDeductible.toLocaleString() : '—'}</td></tr>
          `).join('')}</tbody>
        </table>
      </div>
      <div class="panel">
        <h2>👤 Top Adjusters <span class="sub" style="font-size:11px">N ≥ ${DATA.team.minN}</span></h2>
        <table>
          <thead><tr><th>Name</th><th class="num">Jobs</th><th class="num">Approval</th><th>Stance</th></tr></thead>
          <tbody>${c.adjusters.slice(0, 15).map((a) => `
            <tr>
              <td><a class="riq-link" href="adjuster-detail.html?name=${encodeURIComponent(a.name)}">${a.name}</a></td>
              <td class="num">${a.jobs}</td>
              <td class="num"><span class="pct ${pctClass(a.approvalRate)}">${fmt.pct(a.approvalRate)}</span></td>
              <td>${a.deltaVsCarrier > 0.05 ? '<span class="pill lenient">lenient</span>' : a.deltaVsCarrier < -0.05 ? '<span class="pill strict">strict</span>' : '<span class="pill baseline">baseline</span>'}</td>
            </tr>
          `).join('')}</tbody>
        </table>
      </div>
    </div>

    <div class="panel">
      <h2>🎯 Top Reps Against ${c.name}</h2>
      <table>
        <thead><tr><th>Rep</th><th class="num">Jobs</th><th class="num">Approval</th><th class="num">$ Insured</th><th class="num">vs Carrier Avg</th></tr></thead>
        <tbody>${c.reps.slice(0, 15).map((r) => `
          <tr>
            <td><a class="riq-link" href="cheat-sheet.html?type=rep&name=${encodeURIComponent(r.name)}">${r.name}</a></td>
            <td class="num">${r.jobs}</td>
            <td class="num"><span class="pct ${pctClass(r.approvalRate)}">${fmt.pct(r.approvalRate)}</span></td>
            <td class="num money">${fmt.money(r.insTotal)}</td>
            <td class="num">${deltaPp(r.deltaVsCarrier)}</td>
          </tr>
        `).join('')}</tbody>
      </table>
    </div>
  `;
}

function renderAdjuster(a) {
  return `
    <div class="panel">
      <h2>${a.name} <span class="sub" style="font-size:12px;margin-left:8px">${a.carrier}</span></h2>
      <div class="sub">${a.jobs} signed insurance jobs assigned${a.insufficient ? ' · ⚠ small sample size' : ''}</div>
      <div class="method">
        Math source: <code>projects.json</code> rows with <code>adjusterName === '${a.name}'</code> AND <code>insurance === '${a.carrier}'</code>.
        Stance = approval-rate delta vs the carrier's overall approval baseline; +5pp lenient, −5pp strict.
      </div>
      <div class="kpi-row">
        <div class="kpi"><div class="l">Approval rate</div><div class="v"><span class="pct ${pctClass(a.approvalRate)}">${fmt.pct(a.approvalRate)}</span></div><div class="n">${a.approved} of ${a.jobs - a.dead} (excl. ${a.dead} dead)</div></div>
        <div class="kpi"><div class="l">Stance vs carrier</div><div class="v">${a.stance === 'lenient' ? '<span class="pill lenient">lenient</span>' : a.stance === 'strict' ? '<span class="pill strict">strict</span>' : '<span class="pill baseline">baseline</span>'}</div><div class="delta ${a.deltaVsCarrier > 0 ? 'good' : 'bad'}">${deltaPp(a.deltaVsCarrier)} vs ${a.carrier}</div></div>
        <div class="kpi"><div class="l">Median uplift</div><div class="v">${fmt.pct(a.medianUplift)}</div></div>
        <div class="kpi"><div class="l">Median deductible</div><div class="v">${a.medianDeductible ? '$' + a.medianDeductible.toLocaleString() : '—'}</div></div>
      </div>
    </div>

    <div class="grid-2">
      <div class="panel">
        <h2>🎯 Reps Who Worked With Them</h2>
        <table>
          <thead><tr><th>Rep</th><th class="num">Jobs</th><th class="num">Approval</th></tr></thead>
          <tbody>${a.reps.map((r) => `
            <tr><td><a class="riq-link" href="cheat-sheet.html?type=rep&name=${encodeURIComponent(r.name)}">${r.name}</a></td><td class="num">${r.jobs}</td><td class="num"><span class="pct ${pctClass(r.approvalRate)}">${fmt.pct(r.approvalRate)}</span></td></tr>
          `).join('') || '<tr><td colspan="3" class="insufficient">No rep matches recorded</td></tr>'}</tbody>
        </table>
      </div>
      <div class="panel">
        <h2>📍 Coverage Cities</h2>
        <table>
          <thead><tr><th>City</th><th class="num">Jobs</th></tr></thead>
          <tbody>${a.cities.map((c) => `<tr><td>${c.city}</td><td class="num">${c.jobs}</td></tr>`).join('') || '<tr><td colspan="2" class="insufficient">No city data</td></tr>'}</tbody>
        </table>
      </div>
    </div>
  `;
}

function renderState(s) {
  return `
    <div class="panel">
      <h2>${s.state}</h2>
      <div class="sub">${s.insJobs.toLocaleString()} insurance jobs · ${fmt.pct(s.insApprovalRate)} approval · ${s.retailJobs} retail</div>
      <div class="method">
        Math source: <code>projects.json</code> rows where <code>state === '${s.state}'</code> AND signed. Insurance metrics use insurance-typed jobs only.
      </div>
      <div class="kpi-row">
        <div class="kpi"><div class="l">Insurance Approval</div><div class="v"><span class="pct ${pctClass(s.insApprovalRate)}">${fmt.pct(s.insApprovalRate)}</span></div><div class="n">${s.insApproved} of ${s.insJobs - s.insDead}</div></div>
        <div class="kpi"><div class="l">Insurance Sales</div><div class="v">${fmt.moneyFull(s.insTotal)}</div></div>
        <div class="kpi"><div class="l">Median deductible</div><div class="v">${s.medianDeductible ? '$' + s.medianDeductible.toLocaleString() : '—'}</div></div>
      </div>
      <div class="law">⚖ ${s.lawSummary}</div>
    </div>

    <div class="grid-2">
      <div class="panel">
        <h2>🏢 Top Carriers in ${s.state}</h2>
        <table>
          <thead><tr><th>Carrier</th><th class="num">Jobs</th><th class="num">Approval</th></tr></thead>
          <tbody>${s.topCarriers.map((c) => `
            <tr><td><a class="riq-link" href="cheat-sheet.html?type=carrier&name=${encodeURIComponent(c.name)}">${c.name}</a></td><td class="num">${c.jobs}</td><td class="num"><span class="pct ${pctClass(c.approvalRate)}">${fmt.pct(c.approvalRate)}</span></td></tr>
          `).join('')}</tbody>
        </table>
      </div>
      <div class="panel">
        <h2>👤 Top Adjusters in ${s.state}</h2>
        <table>
          <thead><tr><th>Name</th><th>Carriers</th><th class="num">Jobs</th><th class="num">Approval</th></tr></thead>
          <tbody>${s.topAdjusters.map((a) => `
            <tr><td><a class="riq-link" href="adjuster-detail.html?name=${encodeURIComponent(a.name)}">${a.name}</a></td><td style="font-size:11px;color:var(--muted)">${a.carriers.join(', ')}</td><td class="num">${a.jobs}</td><td class="num"><span class="pct ${pctClass(a.approvalRate)}">${fmt.pct(a.approvalRate)}</span></td></tr>
          `).join('')}</tbody>
        </table>
      </div>
    </div>
  `;
}

function renderZip(z) {
  return `
    <div class="panel">
      <h2>${z.zip} <span class="sub" style="font-size:13px;margin-left:8px">${z.city}</span></h2>
      <div class="sub">${z.insJobs} insurance jobs · ${fmt.pct(z.insApprovalRate)} approval · dominant carrier: <strong>${z.dominantCarrier || '—'}</strong></div>
      <div class="method">
        Math source: <code>projects.json</code> rows where <code>zip.slice(0,5) === '${z.zip}'</code> AND signed.
      </div>
      <div class="kpi-row">
        <div class="kpi"><div class="l">Insurance Approval</div><div class="v"><span class="pct ${pctClass(z.insApprovalRate)}">${fmt.pct(z.insApprovalRate)}</span></div><div class="n">${z.insApproved} of ${z.insJobs - z.insDead}</div></div>
        <div class="kpi"><div class="l">Median deductible</div><div class="v">${z.medianDeductible ? '$' + z.medianDeductible.toLocaleString() : '—'}</div></div>
        <div class="kpi"><div class="l">Dominant carrier</div><div class="v" style="font-size:16px">${z.dominantCarrier || '—'}</div></div>
      </div>
    </div>

    <div class="grid-2">
      <div class="panel">
        <h2>🏢 Carriers in this ZIP</h2>
        <table>
          <thead><tr><th>Carrier</th><th class="num">Jobs</th><th class="num">Approval</th></tr></thead>
          <tbody>${z.topCarriers.map((c) => `
            <tr><td><a class="riq-link" href="cheat-sheet.html?type=carrier&name=${encodeURIComponent(c.name)}">${c.name}</a></td><td class="num">${c.jobs}</td><td class="num"><span class="pct ${pctClass(c.approvalRate)}">${fmt.pct(c.approvalRate)}</span></td></tr>
          `).join('')}</tbody>
        </table>
      </div>
      <div class="panel">
        <h2>👤 Top Adjusters in this ZIP</h2>
        <table>
          <thead><tr><th>Name</th><th class="num">Jobs</th><th class="num">Approval</th></tr></thead>
          <tbody>${z.topAdjusters.map((a) => `
            <tr><td><a class="riq-link" href="adjuster-detail.html?name=${encodeURIComponent(a.name)}">${a.name}</a></td><td class="num">${a.jobs}</td><td class="num"><span class="pct ${pctClass(a.approvalRate)}">${fmt.pct(a.approvalRate)}</span></td></tr>
          `).join('') || '<tr><td colspan="3" class="insufficient">No adjusters with 2+ jobs</td></tr>'}</tbody>
        </table>
      </div>
    </div>

    <div class="panel">
      <h2>🎯 Top Reps in this ZIP</h2>
      <table>
        <thead><tr><th>Rep</th><th class="num">Jobs</th><th class="num">Approved</th></tr></thead>
        <tbody>${z.topReps.map((r) => `
          <tr><td><a class="riq-link" href="cheat-sheet.html?type=rep&name=${encodeURIComponent(r.name)}">${r.name}</a></td><td class="num">${r.jobs}</td><td class="num">${r.approved}</td></tr>
        `).join('')}</tbody>
      </table>
    </div>
  `;
}

load().catch((e) => { $('loading').textContent = 'Failed: ' + e.message; });
</script>
</body>
</html>
