<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Roof Docs — Customer Rollup</title>
<link rel="icon" href="data:," />
<style>
  :root {
    --bg: #1a1612;
    --panel: #2a241e;
    --border: #3d3528;
    --text: #f0ebe2;
    --muted: #a09486;
    --accent: #f4a738;
    --green: #10b981;
    --yellow: #f59e0b;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; min-height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; background: var(--bg); color: var(--text); }
  header { background: var(--panel); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
  header h1 { margin: 0; font-size: 18px; font-weight: 600; }
  header .links a { color: var(--muted); margin-left: 16px; text-decoration: none; font-size: 13px; }
  header .links a.active { color: var(--accent); font-weight: 600; }
  main { padding: 24px; max-width: 1600px; margin: 0 auto; }
  .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 20px; }
  .kpi { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
  .kpi .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
  .kpi .value { font-size: 22px; font-weight: 600; color: var(--accent); margin-top: 4px; }
  section { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 16px 20px; margin-top: 16px; }
  section h2 { margin: 0 0 4px; font-size: 15px; font-weight: 600; }
  section .desc { color: var(--muted); font-size: 12px; margin-bottom: 12px; }
  .filter-bar { display: flex; gap: 12px; flex-wrap: wrap; align-items: end; margin-bottom: 12px; }
  .filter-bar input, .filter-bar select { background: #342c23; color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 6px 10px; font-size: 13px; }
  .filter-bar label { font-size: 12px; color: var(--muted); display: flex; flex-direction: column; gap: 4px; }
  .btn { background: var(--accent); color: #1a1612; border: none; border-radius: 4px; padding: 6px 12px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn.secondary { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; color: var(--muted); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; padding: 8px 6px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--panel); cursor: pointer; user-select: none; }
  th:hover { color: var(--accent); }
  th .arrow { color: var(--accent); margin-left: 4px; }
  td { padding: 6px; border-bottom: 1px solid #342c23; vertical-align: top; }
  tbody tr:hover { background: #342c23; }
  .num { text-align: right; font-variant-numeric: tabular-nums; }
  .money { color: var(--green); }
  .scroll { max-height: 720px; overflow-y: auto; }
  .pill { display: inline-block; padding: 1px 6px; border-radius: 8px; font-size: 10px; background: #342c23; color: var(--text); margin-right: 3px; margin-bottom: 2px; }
  .pill.green { background: rgba(16,185,129,0.2); color: var(--green); }
  .pill.yellow { background: rgba(245,158,11,0.2); color: var(--yellow); }
  .loading { padding: 40px; text-align: center; color: var(--accent); }
</style>
</head>
<body>
<header>
  <h1>Customer Rollup — 7-Year Lifetime View</h1>
  <div class="links">
    <a href="index.html">🏠 Dashboard</a>
    <a href="roofdocs-map.html">Map</a>
    <a href="analytics.html">Analytics</a>
    <a href="customers.html" class="active">Customers</a>
    <a href="upgrade-campaigns.html">Campaigns</a>
    <a href="resurrection.html">Resurrection</a>
    <a href="receivables.html">AR</a>
    <a href="storm-exposure.html">Exposure</a>
    <a href="storm-playbook.html">Playbook</a>
    <a href="adjusters.html">Adjusters</a>
    <a href="reps.html">Reps</a>
  </div>
</header>

<main>
  <div id="loading" class="loading">Loading…</div>
  <div id="content" style="display:none">
    <div class="kpi-row" id="kpis"></div>

    <section>
      <h2>All Customers</h2>
      <div class="desc">Deduped by name + address. Sort by any column. Multi-job customers float to top when sorting by job count.</div>
      <div class="filter-bar">
        <label>Search
          <input id="f-search" type="text" placeholder="name / address / rep / carrier / trade" style="width:340px" />
        </label>
        <label>State <select id="f-state"><option value="">All</option></select></label>
        <label>Min jobs <input id="f-minjobs" type="number" value="" placeholder="1" style="width:80px" /></label>
        <label>Min total revenue <input id="f-minrev" type="number" placeholder="0" style="width:120px" /></label>
        <label>Has trade <select id="f-trade"><option value="">Any</option></select></label>
        <label>&nbsp;<button class="btn" id="btn-csv">Export CSV</button></label>
      </div>
      <div id="count-line" style="color:var(--muted); font-size:12px; margin-bottom:8px"></div>
      <div class="scroll"><table id="tbl"></table></div>
    </section>
  </div>
</main>

<script>
const $ = (id) => document.getElementById(id);
const ROOF_TRADES = new Set(['Roofing', 'Metal Roofing', 'Flat Roofing', 'Cedar Shake Roofing', 'Slate Roofing']);
const fmt = {
  money: (v) => v == null || v === 0 ? '—' : '$' + Math.round(v).toLocaleString(),
  int: (v) => v == null ? '—' : v.toLocaleString(),
};
const isCompleted = (r) => /completed|finalized/i.test(r.stage || '');
const isDead = (r) => /dead|cancel/i.test(r.stage || '');

let allJobs = [];
let customers = [];
let activeRows = [];
let sortKey = 'totalRev';
let sortDir = 'desc';

function custKey(r) {
  return ((r.customer || '').trim().toLowerCase() + '|' +
          (r.addressLine1 || '').trim().toLowerCase() + '|' +
          (r.city || '').trim().toLowerCase());
}

function buildCustomers() {
  const map = new Map();
  for (const j of allJobs) {
    const k = custKey(j);
    if (!k.replace(/\|/g, '').trim()) continue;
    if (!map.has(k)) map.set(k, {
      key: k,
      name: j.customer || '(unknown)',
      addressLine1: j.addressLine1, city: j.city, state: j.state, zip: j.zip,
      lat: j.lat, lng: j.lng,
      jobs: [], trades: new Set(), carriers: new Set(), reps: new Set(),
      totalRev: 0, completedJobs: 0, deadJobs: 0, openJobs: 0,
      lastDate: '', firstDate: '',
    });
    const c = map.get(k);
    c.jobs.push(j);
    for (const t of (j.trades || [])) c.trades.add(t);
    if (j.insurance) c.carriers.add(j.insurance);
    if (j.salesRep) c.reps.add(j.salesRep);
    if (j.jobTotal) c.totalRev += j.jobTotal;
    if (isCompleted(j)) c.completedJobs++;
    else if (isDead(j)) c.deadJobs++;
    else c.openJobs++;
    const d = j.completedDate || j.signedDate;
    if (d) {
      if (!c.lastDate || d > c.lastDate) c.lastDate = d;
      if (!c.firstDate || d < c.firstDate) c.firstDate = d;
    }
  }
  // compute days since last contact
  const today = new Date().toISOString().slice(0, 10);
  for (const c of map.values()) {
    if (c.lastDate) {
      c.daysSince = Math.floor((new Date(today) - new Date(c.lastDate)) / 86400000);
    } else {
      c.daysSince = null;
    }
    c.jobCount = c.jobs.length;
    c.tradeCount = c.trades.size;
  }
  return [...map.values()];
}

function renderKPIs() {
  const total = customers.length;
  const multi = customers.filter((c) => c.jobCount > 1).length;
  const ever = customers.filter((c) => c.completedJobs > 0).length;
  const rev = customers.reduce((s, c) => s + c.totalRev, 0);
  const stale = customers.filter((c) => c.daysSince != null && c.daysSince > 730).length;
  const cards = [
    { label: 'Unique customers', value: fmt.int(total) },
    { label: 'Multi-job customers', value: fmt.int(multi), sub: ((multi / total) * 100).toFixed(1) + '%' },
    { label: 'Customers ever completed', value: fmt.int(ever) },
    { label: 'Stale (>2y no contact)', value: fmt.int(stale) },
    { label: 'Lifetime revenue', value: fmt.money(rev) },
  ];
  $('kpis').innerHTML = cards.map((c) => `
    <div class="kpi"><div class="label">${c.label}</div><div class="value">${c.value}</div>${c.sub ? `<div style="color:var(--muted);font-size:12px">${c.sub}</div>` : ''}</div>
  `).join('');
}

function applyFilters() {
  let rows = customers;
  const q = $('f-search').value.trim().toLowerCase();
  if (q) {
    rows = rows.filter((c) =>
      (c.name || '').toLowerCase().includes(q) ||
      (c.addressLine1 || '').toLowerCase().includes(q) ||
      (c.city || '').toLowerCase().includes(q) ||
      [...c.reps].some((r) => r.toLowerCase().includes(q)) ||
      [...c.carriers].some((c2) => c2.toLowerCase().includes(q)) ||
      [...c.trades].some((t) => t.toLowerCase().includes(q))
    );
  }
  const st = $('f-state').value;
  if (st) rows = rows.filter((c) => c.state === st);
  const minJobs = Number($('f-minjobs').value || 0);
  if (minJobs) rows = rows.filter((c) => c.jobCount >= minJobs);
  const minRev = Number($('f-minrev').value || 0);
  if (minRev) rows = rows.filter((c) => c.totalRev >= minRev);
  const tradeSel = $('f-trade').value;
  if (tradeSel) rows = rows.filter((c) => c.trades.has(tradeSel));
  rows.sort((a, b) => {
    const va = a[sortKey]; const vb = b[sortKey];
    if (va == null && vb == null) return 0;
    if (va == null) return 1;
    if (vb == null) return -1;
    if (typeof va === 'number' && typeof vb === 'number') return sortDir === 'asc' ? va - vb : vb - va;
    return sortDir === 'asc' ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
  });
  activeRows = rows;
  $('count-line').textContent = `${rows.length.toLocaleString()} of ${customers.length.toLocaleString()} customers · ${fmt.money(rows.reduce((s, c) => s + c.totalRev, 0))} lifetime revenue`;
  renderTable(rows);
}

const COLUMNS = [
  { key: 'name', label: 'Customer' },
  { key: 'addressLine1', label: 'Address' },
  { key: 'state', label: 'State' },
  { key: 'jobCount', label: 'Jobs', num: true },
  { key: 'completedJobs', label: 'Completed', num: true },
  { key: 'deadJobs', label: 'Dead', num: true },
  { key: 'openJobs', label: 'Open', num: true },
  { key: 'tradeCount', label: 'Trades', num: true },
  { key: 'totalRev', label: 'Lifetime $', num: true, money: true },
  { key: 'lastDate', label: 'Last contact' },
  { key: 'daysSince', label: 'Days since', num: true },
];

function renderTable(rows) {
  const head = '<thead><tr>' + COLUMNS.map((c) =>
    `<th data-k="${c.key}" class="${c.num ? 'num' : ''}">${c.label}${sortKey === c.key ? `<span class="arrow">${sortDir === 'asc' ? '▲' : '▼'}</span>` : ''}</th>`
  ).join('') + '<th>Trades on file</th><th>Carriers</th></tr></thead>';
  const body = '<tbody>' + rows.slice(0, 1500).map((c) => `
    <tr>
      ${COLUMNS.map((col) => {
        let v = c[col.key];
        if (col.money) v = fmt.money(v);
        else if (col.num) v = v == null ? '—' : fmt.int(v);
        else v = v ?? '—';
        return `<td class="${col.num ? 'num' : ''} ${col.money ? 'money' : ''}">${v}</td>`;
      }).join('')}
      <td><span style="font-size:11px">${[...c.trades].sort().map((t) => `<span class="pill">${t}</span>`).join('') || '—'}</span></td>
      <td><span style="font-size:11px">${[...c.carriers].sort().map((t) => `<span class="pill">${t}</span>`).join('') || '—'}</span></td>
    </tr>
  `).join('') + '</tbody>';
  const tbl = $('tbl');
  tbl.innerHTML = head + body;
  tbl.querySelectorAll('th').forEach((th) => {
    th.addEventListener('click', () => {
      const k = th.dataset.k;
      if (!k) return;
      if (sortKey === k) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      else { sortKey = k; sortDir = 'desc'; }
      applyFilters();
    });
  });
}

function exportCSV() {
  if (!activeRows.length) return;
  const headers = ['Customer', 'Address', 'City', 'State', 'Zip', 'Jobs', 'Completed', 'Dead', 'Open', 'Trades', 'Carriers', 'Reps', 'Lifetime Revenue', 'First Contact', 'Last Contact'];
  const lines = [headers.join(',')];
  for (const c of activeRows) {
    const row = [
      c.name, c.addressLine1, c.city, c.state, c.zip,
      c.jobCount, c.completedJobs, c.deadJobs, c.openJobs,
      [...c.trades].sort().join(';'), [...c.carriers].sort().join(';'), [...c.reps].sort().join(';'),
      Math.round(c.totalRev), c.firstDate, c.lastDate,
    ].map((v) => v == null ? '' : `"${String(v).replace(/"/g, '""')}"`);
    lines.push(row.join(','));
  }
  const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `roofdocs-customers-${new Date().toISOString().slice(0, 10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

async function start() {
  const res = await fetch('/api/intel/projects');
  allJobs = await res.json();
  customers = buildCustomers();
  $('loading').style.display = 'none';
  $('content').style.display = '';
  // Populate filters
  const states = new Set(), trades = new Set();
  for (const c of customers) {
    if (c.state) states.add(c.state);
    for (const t of c.trades) trades.add(t);
  }
  for (const s of [...states].sort()) {
    const o = document.createElement('option'); o.value = s; o.textContent = s; $('f-state').appendChild(o);
  }
  for (const t of [...trades].sort()) {
    const o = document.createElement('option'); o.value = t; o.textContent = t; $('f-trade').appendChild(o);
  }
  $('f-search').addEventListener('input', () => { clearTimeout(window._t); window._t = setTimeout(applyFilters, 250); });
  $('f-state').addEventListener('change', applyFilters);
  $('f-minjobs').addEventListener('input', () => { clearTimeout(window._u); window._u = setTimeout(applyFilters, 250); });
  $('f-minrev').addEventListener('input', () => { clearTimeout(window._v); window._v = setTimeout(applyFilters, 250); });
  $('f-trade').addEventListener('change', applyFilters);
  $('btn-csv').addEventListener('click', exportCSV);
  renderKPIs();
  applyFilters();
}

start().catch((e) => { $('loading').textContent = 'Failed: ' + e; });
</script>
</body>
</html>
