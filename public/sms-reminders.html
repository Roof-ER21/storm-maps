<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Roof Docs — SMS Reminder Generator</title>
<link rel="icon" href="data:," />
<style>
  :root { --bg:#1a1612; --panel:#2a241e; --border:#3d3528; --text:#f0ebe2; --muted:#a09486; --accent:#f4a738; --green:#10b981; --yellow:#f59e0b; --red:#ef4444; --purple:#a78bfa; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; min-height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; background: var(--bg); color: var(--text); }
  header { background: var(--panel); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
  header h1 { margin: 0; font-size: 18px; font-weight: 600; }
  header .links a { color: var(--muted); margin-left: 11px; text-decoration: none; font-size: 12px; }
  header .links a.active { color: var(--accent); font-weight: 600; }
  main { padding: 24px; max-width: 1500px; margin: 0 auto; }
  section { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 16px 20px; margin-top: 16px; }
  section h2 { margin: 0 0 4px; font-size: 15px; font-weight: 600; }
  section .desc { color: var(--muted); font-size: 12px; margin-bottom: 12px; }
  .tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 1px solid var(--border); }
  .tab { padding: 10px 18px; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; font-size: 13px; }
  .tab.active { color: var(--accent); border-color: var(--accent); }
  .filter-bar { display: flex; gap: 12px; flex-wrap: wrap; align-items: end; margin-bottom: 12px; }
  .filter-bar input, .filter-bar select { background: #342c23; color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 6px 10px; font-size: 13px; }
  .filter-bar label { font-size: 12px; color: var(--muted); display: flex; flex-direction: column; gap: 4px; }
  .filter-bar textarea { background: #342c23; color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 8px 12px; font-size: 13px; width: 100%; min-height: 70px; font-family: inherit; }
  .btn { background: var(--accent); color: #1a1612; border: none; border-radius: 4px; padding: 6px 14px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn.secondary { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; color: var(--muted); font-weight: 500; font-size: 11px; text-transform: uppercase; padding: 8px 6px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--panel); }
  td { padding: 6px; border-bottom: 1px solid #342c23; vertical-align: top; }
  tbody tr:hover { background: #342c23; }
  .num { text-align: right; font-variant-numeric: tabular-nums; }
  .money { color: var(--green); }
  .scroll { max-height: 700px; overflow-y: auto; }
  .sms { background: #342c23; padding: 8px 12px; border-radius: 6px; font-size: 12px; line-height: 1.4; max-width: 380px; }
  .copy-btn { background: transparent; color: var(--accent); border: 1px solid var(--accent); border-radius: 3px; padding: 2px 8px; font-size: 11px; cursor: pointer; }
  .copy-btn:hover { background: var(--accent); color: #1a1612; }
  .loading { padding: 40px; text-align: center; color: var(--accent); }
</style>
</head>
<body>
<header>
  <h1>📱 SMS Reminder Generator</h1>
  <div class="links">
    <a href="index.html">🏠 Dashboard</a>
    <a href="receivables.html">AR</a>
    <a href="sms-reminders.html" class="active">SMS</a>
    <a href="resurrection.html">Resurrection</a>
    <a href="storm-exposure.html">Exposure</a>
  </div>
</header>
<main>
  <div id="loading" class="loading">Loading…</div>
  <div id="content" style="display:none">
    <section>
      <div class="tabs">
        <div class="tab active" data-tab="dp">Downpayment Reminders</div>
        <div class="tab" data-tab="ar">AR / Balance Pending</div>
        <div class="tab" data-tab="res">Resurrection (with storm hook)</div>
      </div>

      <h2 id="title">Downpayment Reminders</h2>
      <div class="desc" id="desc">Active downpayments pending collection. Auto-generates a polite SMS reminder per customer.</div>

      <div class="filter-bar">
        <label>Template (use {name}, {addr}, {amount}, {carrier})
          <textarea id="tpl"></textarea>
        </label>
      </div>
      <div class="filter-bar">
        <label>Search <input id="f-search" placeholder="customer / city / carrier" style="width:280px" /></label>
        <label>Status <select id="f-status"><option value="">All</option></select></label>
        <label>&nbsp;<button class="btn" id="btn-csv">Export CSV</button></label>
      </div>
      <div id="count" style="color:var(--muted); font-size:12px; margin-bottom:8px"></div>
      <div class="scroll"><table id="tbl"></table></div>
    </section>
  </div>
</main>
<script src="/riq-links.js"></script>
<script>
const $ = (id) => document.getElementById(id);
const fmt = {
  money: (v) => v == null || v === 0 ? '—' : '$' + Math.round(v).toLocaleString(),
  int: (v) => v == null ? '—' : v.toLocaleString(),
};

const TEMPLATES = {
  dp: 'Hi {name}, this is Roof Docs — just a quick check on the down payment for your {addr} project. Let us know if you have any questions or need help making the payment. Thanks!',
  ar: 'Hi {name}, Roof Docs here — we have a balance pending on your {addr} project for {amount}. Could you let us know when you can take care of that? Thank you!',
  res: 'Hi {name}, Roof Docs — there was a recent storm near your {addr} home and your {carrier} policy may cover damage. Want us to swing by for a free no-obligation inspection? — Roof Docs',
};

let activeTab = 'dp';
let data = { dp: [], ar: [], res: [] };
let active = [];

function activateTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach((t) => t.classList.toggle('active', t.dataset.tab === tab));
  $('tpl').value = TEMPLATES[tab];
  $('title').textContent = {
    dp: 'Downpayment Reminders',
    ar: 'AR / Balance Pending Reminders',
    res: 'Resurrection — Re-engage with storm hook',
  }[tab];
  $('desc').textContent = {
    dp: 'Active downpayments pending collection — auto-generated SMS.',
    ar: 'Open AR with Balance Pending status — polite collection nudge.',
    res: 'Dead insurance jobs with new strong storms — storm-anchored re-engagement.',
  }[tab];
  populateStatus();
  apply();
}

function populateStatus() {
  const sel = $('f-status');
  sel.innerHTML = '<option value="">All</option>';
  const statuses = new Set();
  for (const r of data[activeTab]) if (r.status) statuses.add(r.status);
  for (const s of [...statuses].sort()) {
    const o = document.createElement('option'); o.value = s; o.textContent = s; sel.appendChild(o);
  }
}

function buildSMS(r) {
  return $('tpl').value
    .replace(/{name}/g, r.firstName || r.name || 'there')
    .replace(/{addr}/g, r.address || 'your project')
    .replace(/{amount}/g, r.amount || '')
    .replace(/{carrier}/g, r.carrier || 'insurance');
}

function apply() {
  let rows = data[activeTab];
  const q = $('f-search').value.trim().toLowerCase();
  if (q) rows = rows.filter((r) => `${r.name} ${r.address} ${r.carrier}`.toLowerCase().includes(q));
  const status = $('f-status').value;
  if (status) rows = rows.filter((r) => r.status === status);
  rows = rows.filter((r) => r.phone);
  active = rows;
  $('count').textContent = `${rows.length} customers with phone numbers`;
  render(rows);
}

function render(rows) {
  const head = `<thead><tr><th>Customer</th><th>Phone</th><th>Address</th><th>Carrier</th><th>Status</th><th>SMS Preview</th><th></th></tr></thead>`;
  const body = '<tbody>' + rows.slice(0, 300).map((r, i) => {
    const sms = buildSMS(r);
    return `<tr>
      <td><strong>${r.name || '—'}</strong></td>
      <td><a href="sms:${(r.phone || '').replace(/\D/g, '')}&body=${encodeURIComponent(sms)}" style="color:var(--accent);text-decoration:none">${r.phone}</a></td>
      <td>${r.address || '—'}</td>
      <td>${r.carrier || '—'}</td>
      <td>${r.status || '—'}</td>
      <td><div class="sms">${sms}</div></td>
      <td><button class="copy-btn" data-i="${i}">Copy</button></td>
    </tr>`;
  }).join('') + '</tbody>';
  $('tbl').innerHTML = head + body;
  $('tbl').querySelectorAll('.copy-btn').forEach((btn) => btn.addEventListener('click', () => {
    const i = Number(btn.dataset.i);
    const sms = buildSMS(rows[i]);
    navigator.clipboard.writeText(sms);
    btn.textContent = 'Copied';
    setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
  }));
}

function exportCSV() {
  const headers = ['Name', 'Phone', 'Address', 'Carrier', 'Amount', 'Status', 'SMS'];
  const lines = [headers.join(',')];
  for (const r of active) {
    const row = [r.name, r.phone, r.address, r.carrier, r.amount, r.status, buildSMS(r)]
      .map((v) => v == null ? '' : `"${String(v).replace(/"/g, '""')}"`);
    lines.push(row.join(','));
  }
  const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `roofdocs-sms-${activeTab}-${new Date().toISOString().slice(0, 10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

async function start() {
  const [rec, res] = await Promise.all([
    fetch('/api/intel/receivables').then((r) => r.json()),
    fetch('/api/intel/resurrection').then((r) => r.json()).catch(() => []),
  ]);
  // Downpayments
  data.dp = (rec.downpayments || []).map((d) => ({
    name: `${d.customer?.firstName || ''} ${d.customer?.lastName || ''}`.trim(),
    firstName: d.customer?.firstName,
    phone: d.customer?.cellPhoneNumber || d.customer?.homePhoneNumber,
    address: [d.job?.addressLine1, d.job?.city, d.job?.state].filter(Boolean).join(', '),
    carrier: d.insurance?.company,
    amount: '',
    status: d.status,
  }));
  // AR Balance Pending
  data.ar = (rec.accounts || []).filter((a) => a.status && a.status !== 'CF Received').map((a) => ({
    name: `${a.customer?.firstName || ''} ${a.customer?.lastName || ''}`.trim(),
    firstName: a.customer?.firstName,
    phone: a.customer?.cellPhoneNumber || a.customer?.homePhoneNumber,
    address: [a.job?.addressLine1, a.job?.city, a.job?.state].filter(Boolean).join(', '),
    carrier: a.insurance?.company,
    amount: a.proj?.jobTotal || a.job?.jobTotal ? '$' + Math.round(a.proj?.jobTotal || a.job?.jobTotal).toLocaleString() : '',
    status: a.status,
  }));
  // Resurrection — note resurrection.json doesn't have phone yet; we'll build SMS w/o phone for now
  data.res = res.filter((r) => r.adjusterName || r.customer).map((r) => ({
    name: r.customer || '',
    firstName: (r.customer || '').split(' ')[0],
    phone: '',  // not in resurrection.json yet
    address: r.address,
    carrier: r.insurance,
    amount: '',
    status: r.strongestStorm?.stormType,
  }));

  $('loading').style.display = 'none';
  $('content').style.display = '';
  $('f-search').addEventListener('input', () => { clearTimeout(window._t); window._t = setTimeout(apply, 200); });
  $('f-status').addEventListener('change', apply);
  $('tpl').addEventListener('input', () => { clearTimeout(window._u); window._u = setTimeout(apply, 250); });
  $('btn-csv').addEventListener('click', exportCSV);
  document.querySelectorAll('.tab').forEach((t) => t.addEventListener('click', () => activateTab(t.dataset.tab)));
  activateTab('dp');
}
start().catch((e) => { $('loading').textContent = 'Failed: ' + e; });
</script>
</body>
</html>
