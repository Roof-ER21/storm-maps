<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Roof Docs — Notes Search</title>
<link rel="icon" href="data:," />
<style>
  :root { --bg:#1a1612; --panel:#2a241e; --border:#3d3528; --text:#f0ebe2; --muted:#a09486; --accent:#f4a738; --green:#10b981; --yellow:#f59e0b; --red:#ef4444; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; min-height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; background: var(--bg); color: var(--text); }
  header { background: var(--panel); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
  header h1 { margin: 0; font-size: 18px; font-weight: 600; }
  header .links a { color: var(--muted); margin-left: 11px; text-decoration: none; font-size: 12px; }
  header .links a.active { color: var(--accent); font-weight: 600; }
  main { padding: 24px; max-width: 1500px; margin: 0 auto; }
  .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 20px; }
  .kpi { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
  .kpi .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
  .kpi .value { font-size: 24px; font-weight: 600; color: var(--accent); margin-top: 4px; }
  section { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 16px 20px; margin-top: 16px; }
  section h2 { margin: 0 0 4px; font-size: 15px; font-weight: 600; }
  .filter-bar { display: flex; gap: 12px; flex-wrap: wrap; align-items: end; margin-bottom: 12px; }
  .filter-bar input, .filter-bar select { background: #342c23; color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 6px 10px; font-size: 13px; }
  .filter-bar label { font-size: 12px; color: var(--muted); display: flex; flex-direction: column; gap: 4px; }
  .btn { background: var(--accent); color: #1a1612; border: none; border-radius: 4px; padding: 6px 12px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .note-card { background: #342c23; border: 1px solid var(--border); border-radius: 6px; padding: 12px 16px; margin-bottom: 12px; }
  .note-card .head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .note-card .name { font-weight: 600; color: var(--accent); }
  .note-card .addr { color: var(--muted); font-size: 12px; }
  .note-card .meta { color: var(--muted); font-size: 11px; }
  .note-card .text { white-space: pre-wrap; line-height: 1.5; font-size: 13px; }
  .note-card .label { font-size: 10px; text-transform: uppercase; color: var(--muted); margin-right: 6px; }
  .note-card .upsell { background: rgba(245,158,11,0.1); border-left: 3px solid var(--yellow); padding: 8px 10px; border-radius: 0 4px 4px 0; margin-top: 6px; }
  .note-card .install { background: rgba(94,200,255,0.1); border-left: 3px solid var(--accent); padding: 8px 10px; border-radius: 0 4px 4px 0; margin-top: 6px; }
  .note-card .general { background: rgba(16,185,129,0.08); border-left: 3px solid var(--green); padding: 8px 10px; border-radius: 0 4px 4px 0; margin-top: 6px; }
  .note-card .status { background: rgba(168,139,250,0.08); border-left: 3px solid #a78bfa; padding: 8px 10px; border-radius: 0 4px 4px 0; margin-top: 6px; }
  mark { background: rgba(245,158,11,0.3); color: var(--text); padding: 0 2px; }
  .scroll { max-height: 820px; overflow-y: auto; }
  .loading { padding: 40px; text-align: center; color: var(--accent); }
  .empty { padding: 30px; text-align: center; color: var(--muted); }
</style>
</head>
<body>
<header>
  <h1>📝 Notes Search — Install Gotchas, Upsell Hints, Red Flags</h1>
  <div class="links">
    <a href="index.html">🏠 Dashboard</a>
    <a href="roofdocs-map.html">Map</a>
    <a href="analytics.html">Analytics</a>
    <a href="customers.html">Customers</a>
    <a href="upgrade-campaigns.html">Campaigns</a>
    <a href="resurrection.html">Resurrection</a>
    <a href="receivables.html">AR</a>
    <a href="storm-exposure.html">Exposure</a>
    <a href="storm-playbook.html">Playbook</a>
    <a href="adjusters.html">Adjusters</a>
    <a href="reps.html">Reps</a>
    <a href="zip-intel.html">ZIP Intel</a>
    <a href="hot-zips.html">Hot ZIPs</a>
    <a href="notes.html" class="active">Notes</a>
  </div>
</header>

<main>
  <div id="loading" class="loading">Loading…</div>
  <div id="content" style="display:none">
    <div class="kpi-row" id="kpis"></div>

    <section>
      <div class="filter-bar">
        <label>Search notes (text)
          <input id="f-search" placeholder="e.g. dog, gate, supplement, leak" style="width:320px" />
        </label>
        <label>Note type
          <select id="f-type">
            <option value="">All types</option>
            <option value="upsellNotes">Upsell notes (8,483)</option>
            <option value="notes">General notes (5,534)</option>
            <option value="installNotes">Install notes (48)</option>
            <option value="statusUpdate">Status updates (496)</option>
          </select>
        </label>
        <label>State <select id="f-state"><option value="">All</option></select></label>
        <label>Sales Rep <select id="f-rep"><option value="">All</option></select></label>
        <label>Carrier <select id="f-carrier"><option value="">All</option></select></label>
      </div>
      <div id="count" style="color:var(--muted); font-size:12px; margin-bottom:8px"></div>
      <div class="scroll" id="results"></div>
    </section>
  </div>
</main>

<script src="/riq-links.js"></script>
<script>
const $ = (id) => document.getElementById(id);
let all = [], active = [];

function renderKPIs() {
  $('kpis').innerHTML = `
    <div class="kpi"><div class="label">Total jobs with notes</div><div class="value">${all.length.toLocaleString()}</div></div>
    <div class="kpi"><div class="label">Upsell notes</div><div class="value">${all.filter((n) => n.upsellNotes).length.toLocaleString()}</div></div>
    <div class="kpi"><div class="label">General notes</div><div class="value">${all.filter((n) => n.notes).length.toLocaleString()}</div></div>
    <div class="kpi"><div class="label">Install notes</div><div class="value">${all.filter((n) => n.installNotes).length.toLocaleString()}</div></div>
    <div class="kpi"><div class="label">Status updates</div><div class="value">${all.filter((n) => n.statusUpdate).length.toLocaleString()}</div></div>
  `;
}

function escape(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function highlight(s, q) {
  if (!q || !s) return escape(s);
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return escape(s).replace(re, '<mark>$1</mark>');
}

function applyFilters() {
  let rows = all;
  const q = $('f-search').value.trim().toLowerCase();
  const type = $('f-type').value;
  if (type) rows = rows.filter((r) => r[type]);
  if (q) rows = rows.filter((r) => {
    const fields = [r.notes, r.installNotes, r.upsellNotes, r.statusUpdate, r.customer, r.address];
    return fields.some((f) => f && f.toLowerCase().includes(q));
  });
  const st = $('f-state').value;
  if (st) rows = rows.filter((r) => r.state === st);
  const rep = $('f-rep').value;
  if (rep) rows = rows.filter((r) => r.salesRep === rep);
  const ins = $('f-carrier').value;
  if (ins) rows = rows.filter((r) => r.insurance === ins);
  active = rows;
  $('count').textContent = `${rows.length.toLocaleString()} matching jobs`;
  render(rows.slice(0, 300), q);
}

function render(rows, q) {
  if (rows.length === 0) {
    $('results').innerHTML = '<div class="empty">No matches.</div>';
    return;
  }
  $('results').innerHTML = rows.map((r) => `
    <div class="note-card">
      <div class="head">
        <div>
          <span class="name">${escape(r.customer || '—')}</span>
          <span class="addr">  ${escape(r.address)}</span>
        </div>
        <div class="meta">${r.insurance || '—'} · ${r.salesRep || '—'} · ${r.stage || '—'} · ${r.signedDate || '—'} · #${r.id}</div>
      </div>
      ${r.notes ? `<div class="general"><span class="label">Notes</span><span class="text">${highlight(r.notes, q)}</span></div>` : ''}
      ${r.upsellNotes ? `<div class="upsell"><span class="label">Upsell</span><span class="text">${highlight(r.upsellNotes, q)}</span></div>` : ''}
      ${r.installNotes ? `<div class="install"><span class="label">Install</span><span class="text">${highlight(r.installNotes, q)}</span></div>` : ''}
      ${r.statusUpdate ? `<div class="status"><span class="label">Status</span><span class="text">${highlight(r.statusUpdate, q)}</span></div>` : ''}
    </div>
  `).join('');
}

async function start() {
  const res = await fetch('/api/intel/notes');
  all = await res.json();
  $('loading').style.display = 'none';
  $('content').style.display = '';
  const states = new Set(), reps = new Set(), carriers = new Set();
  for (const n of all) {
    if (n.state) states.add(n.state);
    if (n.salesRep) reps.add(n.salesRep);
    if (n.insurance) carriers.add(n.insurance);
  }
  for (const s of [...states].sort()) { const o = document.createElement('option'); o.value = s; o.textContent = s; $('f-state').appendChild(o); }
  for (const r of [...reps].sort()) { const o = document.createElement('option'); o.value = r; o.textContent = r; $('f-rep').appendChild(o); }
  for (const c of [...carriers].sort()) { const o = document.createElement('option'); o.value = c; o.textContent = c; $('f-carrier').appendChild(o); }
  $('f-search').addEventListener('input', () => { clearTimeout(window._t); window._t = setTimeout(applyFilters, 250); });
  for (const id of ['f-type', 'f-state', 'f-rep', 'f-carrier']) $(id).addEventListener('change', applyFilters);
  renderKPIs();
  applyFilters();
}
start().catch((e) => { $('loading').textContent = 'Failed: ' + e; });
</script>
</body>
</html>
