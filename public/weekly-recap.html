<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Roof Docs — Weekly Recap</title>
<link rel="icon" href="data:," />
<style>
  :root { --bg:#1a1612; --panel:#2a241e; --border:#3d3528; --text:#f0ebe2; --muted:#a09486; --accent:#f4a738; --green:#10b981; --yellow:#f59e0b; --red:#ef4444; --purple:#a78bfa; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; min-height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; background: var(--bg); color: var(--text); }
  header { background: var(--panel); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
  header h1 { margin: 0; font-size: 18px; font-weight: 600; }
  header .links a { color: var(--muted); margin-left: 11px; text-decoration: none; font-size: 12px; }
  header .links a.active { color: var(--accent); font-weight: 600; }
  main { padding: 24px; max-width: 1100px; margin: 0 auto; }
  .controls { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 14px 20px; margin-bottom: 20px; display: flex; gap: 16px; align-items: end; flex-wrap: wrap; }
  .controls label { font-size: 12px; color: var(--muted); display: flex; flex-direction: column; gap: 4px; }
  .controls input, .controls select { background: #342c23; color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 6px 10px; font-size: 13px; }
  .btn { background: var(--accent); color: #1a1612; border: none; border-radius: 4px; padding: 8px 16px; font-size: 13px; font-weight: 700; cursor: pointer; }
  .btn.secondary { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
  .recap { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 32px; }
  .recap h1.main { font-size: 26px; font-weight: 800; margin: 0 0 4px; color: var(--accent); }
  .recap .week { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
  .recap h2 { font-size: 16px; margin: 26px 0 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .recap h2 .pill { font-size: 11px; padding: 2px 8px; background: var(--accent); color: #1a1612; border-radius: 10px; font-weight: 700; margin-left: 8px; }
  .recap .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin-bottom: 14px; }
  .recap .kpi { background: #342c23; border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; }
  .recap .kpi .l { font-size: 10px; color: var(--muted); text-transform: uppercase; }
  .recap .kpi .v { font-size: 20px; font-weight: 700; color: var(--accent); margin-top: 4px; }
  .recap .kpi .d { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .recap .kpi .d.up { color: var(--green); }
  .recap .kpi .d.down { color: var(--red); }
  .recap ul { padding-left: 22px; margin: 8px 0; }
  .recap li { margin-bottom: 4px; font-size: 13px; line-height: 1.5; }
  .recap table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 8px; }
  .recap th { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border); color: var(--muted); font-weight: 500; font-size: 11px; text-transform: uppercase; }
  .recap td { padding: 5px 8px; border-bottom: 1px solid #342c23; }
  .recap .money { color: var(--green); }
  .recap .num { text-align: right; font-variant-numeric: tabular-nums; }
  .pill.hail { background: rgba(168,139,250,0.2); color: var(--purple); padding: 2px 6px; border-radius: 4px; font-size: 11px; }
  .pill.wind { background: rgba(94,200,255,0.2); color: var(--accent); padding: 2px 6px; border-radius: 4px; font-size: 11px; }
  .pill.tornado { background: rgba(239,68,68,0.2); color: var(--red); padding: 2px 6px; border-radius: 4px; font-size: 11px; }
  .empty { color: var(--muted); font-style: italic; }
  .loading { padding: 40px; text-align: center; color: var(--accent); }
  /* Print/email-friendly */
  @media print {
    header, .controls { display: none; }
    body { background: #fff; color: #000; }
    .recap { background: #fff; border: none; box-shadow: none; color: #000; padding: 16px; }
    .recap .kpi { background: #f0ebe2; border-color: #f0ebe2; }
    .recap .kpi .v { color: #2d5af3; }
  }
</style>
</head>
<body>
<header>
  <h1>📰 Weekly Recap</h1>
  <div class="links">
    <a href="index.html">🏠 Dashboard</a>
    <a href="weekly-recap.html" class="active">Weekly Recap</a>
    <a href="exec.html">Exec</a>
    <a href="resurrection.html">Resurrection</a>
  </div>
</header>
<main>
  <div class="controls">
    <label>Window
      <select id="window">
        <option value="7" selected>Past 7 days</option>
        <option value="14">Past 14 days</option>
        <option value="30">Past 30 days</option>
      </select>
    </label>
    <label>State filter
      <select id="state"><option value="">All</option><option>VA</option><option>MD</option><option>PA</option></select>
    </label>
    <label>&nbsp;<button class="btn" id="print">Print / Save as PDF</button></label>
    <label>&nbsp;<button class="btn secondary" id="copy">Copy as HTML (paste in email)</button></label>
    <label>&nbsp;<button class="btn secondary" id="dl">Download HTML</button></label>
  </div>
  <div id="loading" class="loading">Loading data…</div>
  <article class="recap" id="recap" style="display:none"></article>
</main>
<script>
const $ = (id) => document.getElementById(id);
const fmt = {
  money: (v) => v == null || v === 0 ? '—' : (v >= 1e6 ? '$' + (v / 1e6).toFixed(2) + 'M' : v >= 1e3 ? '$' + (v / 1e3).toFixed(0) + 'k' : '$' + Math.round(v).toLocaleString()),
  int: (v) => v == null ? '—' : v.toLocaleString(),
};
const isCompleted = (r) => /completed|finalized/i.test(r.stage || '');
const isDead = (r) => /dead|cancel/i.test(r.stage || '');

let allJobs = [], allStorms = [], allExposure = [], resurrection = [], receivables = { accounts: [], downpayments: [] };

function dateDaysAgo(d) { return new Date(Date.now() - d * 86400000); }

function buildRecap() {
  const days = Number($('window').value);
  const state = $('state').value;
  const since = dateDaysAgo(days);
  const sinceStr = since.toISOString().slice(0, 10);
  const today = new Date().toISOString().slice(0, 10);
  const weekLabel = `${since.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} – ${new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}`;

  let jobs = allJobs;
  if (state) jobs = jobs.filter((j) => j.state === state);

  // New signed this window
  const newSigned = jobs.filter((j) => j.signedDate && j.signedDate >= sinceStr);
  // Completed this window
  const newCompleted = jobs.filter((j) => j.completedDate && j.completedDate >= sinceStr);
  // Dead this window
  const newDead = jobs.filter((j) => isDead(j) && (j.finalizedDate || j.signedDate) >= sinceStr);
  // Revenue closed this window
  const closedRev = newCompleted.reduce((s, j) => s + (j.jobTotal || 0), 0);
  // Compare to prior window (for delta)
  const priorSince = new Date(since.getTime() - days * 86400000).toISOString().slice(0, 10);
  const priorSigned = jobs.filter((j) => j.signedDate && j.signedDate >= priorSince && j.signedDate < sinceStr);
  const priorCompleted = jobs.filter((j) => j.completedDate && j.completedDate >= priorSince && j.completedDate < sinceStr);
  const priorRev = priorCompleted.reduce((s, j) => s + (j.jobTotal || 0), 0);
  const deltaSigned = newSigned.length - priorSigned.length;
  const deltaRev = closedRev - priorRev;

  // Top reps this window
  const repAgg = {};
  for (const j of newSigned) {
    if (!j.salesRep) continue;
    repAgg[j.salesRep] = repAgg[j.salesRep] || { signed: 0, revenue: 0 };
    repAgg[j.salesRep].signed++;
    if (j.jobTotal) repAgg[j.salesRep].revenue += j.jobTotal;
  }
  const topReps = Object.entries(repAgg).sort((a, b) => b[1].signed - a[1].signed).slice(0, 5);

  // Storms this window
  const recentStorms = allStorms.filter((s) => {
    if (!s.valid) return false;
    const ts = new Date(s.valid).getTime();
    return ts >= since.getTime() && ts <= Date.now() && (state ? s.state === state : true);
  });
  const strongStorms = recentStorms.filter((s) =>
    (s.type === 'HAIL' && (s.mag || 0) >= 1.0) ||
    ((s.type || '').includes('WND') && (s.mag || 0) >= 60) ||
    s.type === 'TORNADO'
  ).sort((a, b) => (b.valid || '').localeCompare(a.valid || ''));

  // For each strong storm — how many customers within 3mi?
  const stormCustomers = [];
  function hav(la, lo, lb, lob) {
    const R = 3958.7613, φ1=la*Math.PI/180, φ2=lb*Math.PI/180;
    const dφ=(lb-la)*Math.PI/180, dλ=(lob-lo)*Math.PI/180;
    const a = Math.sin(dφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(dλ/2)**2;
    return 2*R*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }
  for (const s of strongStorms.slice(0, 5)) {
    let near = 0;
    for (const j of jobs) {
      if (j.lat == null || j.lng == null) continue;
      if (hav(s.lat, s.lng, j.lat, j.lng) <= 3) near++;
    }
    stormCustomers.push({ ...s, nearbyCustomers: near });
  }

  // Resurrection new candidates (storm hit since past week)
  const newResurrection = resurrection.filter((r) => {
    const sd = r.strongestStorm.stormDate;
    return sd && sd >= sinceStr;
  });

  // AR snapshot
  const arTotal = receivables.accounts.reduce((s, a) => s + (a.proj?.jobTotal || a.job?.jobTotal || 0), 0);
  const cfPending = receivables.accounts.filter((a) => a.status === 'CF Pending' || a.status === 'CF Sent').length;

  // Build HTML
  $('recap').innerHTML = `
    <h1 class="main">RIQ 21 — Weekly Recap</h1>
    <div class="week">${weekLabel}${state ? ' · ' + state + ' only' : ''} · ${days}-day window</div>

    <h2>📊 The Numbers <span class="pill">Past ${days} days</span></h2>
    <div class="kpi-row">
      <div class="kpi"><div class="l">New signed</div><div class="v">${newSigned.length}</div><div class="d ${deltaSigned >= 0 ? 'up' : 'down'}">${deltaSigned >= 0 ? '+' : ''}${deltaSigned} vs prior</div></div>
      <div class="kpi"><div class="l">Newly completed</div><div class="v">${newCompleted.length}</div></div>
      <div class="kpi"><div class="l">Newly dead</div><div class="v">${newDead.length}</div></div>
      <div class="kpi"><div class="l">Revenue closed</div><div class="v">${fmt.money(closedRev)}</div><div class="d ${deltaRev >= 0 ? 'up' : 'down'}">${deltaRev >= 0 ? '+' : ''}${fmt.money(deltaRev)} vs prior</div></div>
      <div class="kpi"><div class="l">Open AR</div><div class="v">${fmt.money(arTotal)}</div><div class="d">${receivables.accounts.length} accounts</div></div>
    </div>

    <h2>🏆 Top Reps This Week</h2>
    ${topReps.length === 0 ? '<div class="empty">No new signs this window.</div>' :
      `<table><thead><tr><th>Rep</th><th class="num">Signed</th><th class="num">Revenue</th></tr></thead>
       <tbody>${topReps.map(([n, s]) => `<tr><td>${n}</td><td class="num">${s.signed}</td><td class="num money">${fmt.money(s.revenue)}</td></tr>`).join('')}</tbody></table>`}

    <h2>🌪 Strong Storms This Week</h2>
    ${strongStorms.length === 0 ? '<div class="empty">No major hail/wind events in window.</div>' : `
      <table><thead><tr><th>Date</th><th>Type</th><th>Mag</th><th>Where</th><th class="num">Customers in 3mi</th></tr></thead>
      <tbody>${stormCustomers.map((s) => `
        <tr>
          <td>${(s.valid || '').slice(0, 10)}</td>
          <td><span class="pill ${s.type === 'HAIL' ? 'hail' : s.type === 'TORNADO' ? 'tornado' : 'wind'}">${s.type}</span></td>
          <td>${s.mag || '—'} ${s.unit || ''}</td>
          <td>${s.city || ''}, ${s.state || ''}</td>
          <td class="num">${s.nearbyCustomers}</td>
        </tr>
      `).join('')}</tbody></table>
    `}

    <h2>🪦 New Resurrection Candidates <span class="pill">${newResurrection.length} new</span></h2>
    ${newResurrection.length === 0 ? '<div class="empty">No new dead-job-hit-by-storm matches this week.</div>' : `
      <ul>${newResurrection.slice(0, 10).map((r) => `
        <li><strong>${r.customer || '—'}</strong> · ${r.address} · ${r.insurance || '—'} (dead ${r.lastTouchDate}) → ${r.strongestStorm.stormType} ${r.strongestStorm.stormMagnitude || ''} hit ${(r.strongestStorm.stormDate || '').slice(0, 10)} at ${r.strongestStorm.stormDistanceMiles.toFixed(1)} mi</li>
      `).join('')}</ul>
      ${newResurrection.length > 10 ? `<div style="color:var(--muted);font-size:12px;margin-top:6px">+${newResurrection.length - 10} more — see <a href="resurrection.html" style="color:var(--accent)">Resurrection list</a></div>` : ''}
    `}

    <h2>⚠️ AR Watch</h2>
    <div class="kpi-row">
      <div class="kpi"><div class="l">CF Pending / Sent</div><div class="v">${cfPending}</div></div>
      <div class="kpi"><div class="l">Total open accounts</div><div class="v">${receivables.accounts.length}</div></div>
      <div class="kpi"><div class="l">Downpayments awaiting</div><div class="v">${receivables.downpayments.filter((d) => d.status !== 'Collected').length}</div></div>
    </div>

    <h2>📌 Action Items For This Week</h2>
    <ul>
      ${newResurrection.length > 0 ? `<li>📞 Call/text the ${newResurrection.length} new resurrection candidate(s). Same-storm hook — see specific addresses above.</li>` : ''}
      ${strongStorms.length > 0 ? `<li>🌪 ${strongStorms.length} strong storm(s) hit this week. Generate ride-out lists from <a href="storm-playbook.html" style="color:var(--accent)">Storm Playbook</a>.</li>` : ''}
      ${cfPending > 0 ? `<li>💰 ${cfPending} CF Pending/Sent — push completion funds collection from <a href="receivables.html" style="color:var(--accent)">AR page</a>.</li>` : ''}
      ${newDead.length > 0 ? `<li>🪦 ${newDead.length} job(s) went dead this week — review for resurrection setup.</li>` : ''}
      <li>📊 Open <a href="exec.html" style="color:var(--accent)">Exec Snapshot</a> for full intelligence brief.</li>
    </ul>

    <div style="color:var(--muted);font-size:11px;margin-top:30px;border-top:1px solid var(--border);padding-top:12px">
      Generated ${new Date().toLocaleString()} · ${jobs.length.toLocaleString()} projects in book · ${allStorms.length.toLocaleString()} storm events tracked
    </div>
  `;
  $('loading').style.display = 'none';
  $('recap').style.display = '';
}

async function start() {
  const [r1, r2, r3, r4] = await Promise.all([
    fetch('/api/intel/projects').then((r) => r.json()),
    fetch('/api/intel/storms-light').then((r) => r.json()),
    fetch('/api/intel/resurrection').then((r) => r.json()).catch(() => []),
    fetch('/api/intel/receivables').then((r) => r.json()).catch(() => ({ accounts: [], downpayments: [] })),
  ]);
  allJobs = r1;
  // storms-light is GeoJSON FeatureCollection — unwrap + normalize.
  const features = Array.isArray(r2) ? r2 : (r2?.features || []);
  allStorms = features.map((f) => {
    const p = f.properties || {};
    const c = (f.geometry || {}).coordinates;
    if (!Array.isArray(c)) return null;
    return {
      type: p.typetext,
      mag: p.magf != null ? Number(p.magf) : (p.magnitude != null ? Number(p.magnitude) : null),
      valid: p.valid,
      city: p.city,
      state: p.state,
      lat: c[1],
      lng: c[0],
    };
  }).filter(Boolean);
  resurrection = r3; receivables = r4;
  $('window').addEventListener('change', buildRecap);
  $('state').addEventListener('change', buildRecap);
  $('print').addEventListener('click', () => window.print());
  $('copy').addEventListener('click', async () => {
    const html = $('recap').outerHTML;
    await navigator.clipboard.writeText(html);
    $('copy').textContent = 'Copied!';
    setTimeout(() => $('copy').textContent = 'Copy as HTML (paste in email)', 1500);
  });
  $('dl').addEventListener('click', () => {
    const html = '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Weekly Recap</title></head><body>' + $('recap').outerHTML + '</body></html>';
    const blob = new Blob([html], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `weekly-recap-${new Date().toISOString().slice(0, 10)}.html`;
    a.click();
    URL.revokeObjectURL(url);
  });
  buildRecap();
}
start().catch((e) => { $('loading').textContent = 'Failed: ' + e; });
</script>
</body>
</html>
