<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Roof Docs — Adjuster Detail</title>
<link rel="icon" href="data:," />
<style>
  :root { --bg:#1a1612; --panel:#2a241e; --border:#3d3528; --text:#f0ebe2; --muted:#a09486; --accent:#f4a738; --green:#10b981; --yellow:#f59e0b; --red:#ef4444; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; min-height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; background: var(--bg); color: var(--text); }
  header { background: var(--panel); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
  header h1 { margin: 0; font-size: 18px; font-weight: 600; }
  header .links a { color: var(--muted); margin-left: 11px; text-decoration: none; font-size: 12px; }
  header .links a.active { color: var(--accent); font-weight: 600; }
  main { padding: 24px; max-width: 1700px; margin: 0 auto; }
  .layout { display: grid; grid-template-columns: 360px 1fr; gap: 16px; }
  @media (max-width: 1100px) { .layout { grid-template-columns: 1fr; } }
  section { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 16px 20px; }
  section h2 { margin: 0 0 4px; font-size: 14px; font-weight: 600; }
  section .desc { color: var(--muted); font-size: 12px; margin-bottom: 12px; }
  .list { max-height: 800px; overflow-y: auto; }
  .item { padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 6px; cursor: pointer; transition: border-color 0.15s; }
  .item:hover { border-color: var(--accent); }
  .item.active { border-color: var(--accent); background: #342c23; }
  .item .name { font-weight: 600; color: var(--text); }
  .item .stats { color: var(--muted); font-size: 11px; margin-top: 2px; }
  .filter-bar input { background: #342c23; color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 6px 10px; font-size: 13px; width: 100%; margin-bottom: 10px; }
  .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 16px; }
  .kpi { background: #342c23; border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; }
  .kpi .label { color: var(--muted); font-size: 10px; text-transform: uppercase; }
  .kpi .value { font-size: 20px; font-weight: 700; color: var(--accent); margin-top: 4px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 800px) { .grid-2 { grid-template-columns: 1fr; } }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; color: var(--muted); font-weight: 500; font-size: 11px; text-transform: uppercase; padding: 6px; border-bottom: 1px solid var(--border); }
  td { padding: 5px 6px; border-bottom: 1px solid #342c23; }
  .num { text-align: right; font-variant-numeric: tabular-nums; }
  .money { color: var(--green); }
  .pct { color: var(--accent); }
  .pct.bad { color: var(--red); }
  .scroll { max-height: 360px; overflow-y: auto; }
  .contact { margin-top: 10px; font-size: 13px; }
  .contact a { color: var(--accent); text-decoration: none; margin-right: 16px; }
  .loading { padding: 40px; text-align: center; color: var(--accent); }
</style>
</head>
<body>
<header>
  <h1>📋 Adjuster Detail</h1>
  <div class="links">
    <a href="index.html">🏠 Dashboard</a>
    <a href="adjusters.html">All Adjusters</a>
    <a href="adjuster-detail.html" class="active">Adjuster Detail</a>
    <a href="carrier-detail.html">Carrier Detail</a>
    <a href="analytics.html">Analytics</a>
  </div>
</header>
<main>
  <div id="loading" class="loading">Loading…</div>
  <div id="content" style="display:none">
    <div class="layout">
      <section>
        <h2>Adjusters</h2>
        <div class="desc">Sorted by approved jobs. Click any for full intel.</div>
        <div class="filter-bar"><input id="search" placeholder="Search name or carrier" /></div>
        <div id="count" style="color:var(--muted);font-size:12px;margin-bottom:8px"></div>
        <div class="list" id="list"></div>
      </section>
      <section id="detail">
        <div class="loading">Pick an adjuster</div>
      </section>
    </div>
  </div>
</main>
<script src="/riq-links.js"></script>
<script>
const $ = (id) => document.getElementById(id);
const fmt = {
  money: (v) => v == null || v === 0 ? '—' : '$' + Math.round(v).toLocaleString(),
  int: (v) => v == null ? '—' : v.toLocaleString(),
  pct: (v) => v == null ? '—' : (v * 100).toFixed(1) + '%',
};
const isCompleted = (r) => /completed|finalized/i.test(r.stage || '');
const isDead = (r) => /dead|cancel/i.test(r.stage || '');
let jobs = [], adjusters = [];

function buildAdjusters() {
  const m = new Map();
  for (const j of jobs) {
    if (!j.adjusterName || j.adjusterName.trim() === '') continue;
    const k = `${j.adjusterName.trim()}|${j.insurance || 'Unknown'}`;
    if (!m.has(k)) m.set(k, { name: j.adjusterName.trim(), carrier: j.insurance || 'Unknown', jobs: [], emails: new Set(), phones: new Set(), supervisors: new Set() });
    const e = m.get(k);
    e.jobs.push(j);
    if (j.adjusterEmail) e.emails.add(j.adjusterEmail);
    if (j.adjusterPhone) e.phones.add(j.adjusterPhone);
    if (j.supervisorName) e.supervisors.add(j.supervisorName);
  }
  return [...m.values()].map((a) => {
    const signed = a.jobs.length;
    const completed = a.jobs.filter(isCompleted).length;
    const dead = a.jobs.filter(isDead).length;
    const revenue = a.jobs.filter(isCompleted).reduce((s, j) => s + (j.jobTotal || 0), 0);
    return { ...a, signed, completed, dead, revenue, approvalRate: signed - dead > 0 ? completed / (signed - dead) : 0 };
  }).sort((a, b) => b.completed - a.completed);
}

function renderList() {
  const q = ($('search').value || '').trim().toLowerCase();
  let rows = adjusters;
  if (q) rows = rows.filter((a) => a.name.toLowerCase().includes(q) || a.carrier.toLowerCase().includes(q));
  $('count').textContent = `${rows.length} adjusters`;
  $('list').innerHTML = rows.slice(0, 300).map((a) => `
    <div class="item" data-k="${(a.name + '|' + a.carrier).replace(/"/g, '&quot;')}">
      <div class="name">${a.name} <span style="color:var(--muted);font-weight:400;font-size:11px">· ${a.carrier}</span></div>
      <div class="stats">${a.signed} jobs · ${a.completed} approved (${fmt.pct(a.approvalRate)})</div>
    </div>
  `).join('');
  $('list').querySelectorAll('.item').forEach((el) => el.addEventListener('click', () => {
    $('list').querySelectorAll('.item').forEach((x) => x.classList.remove('active'));
    el.classList.add('active');
    show(el.dataset.k);
  }));
}

function show(key) {
  const a = adjusters.find((x) => `${x.name}|${x.carrier}` === key);
  if (!a) return;
  const cities = {}, zips = {}, reps = {}, trades = {};
  const deductibles = [];
  const yearAgg = {};
  for (const j of a.jobs) {
    if (j.city) cities[j.city] = (cities[j.city] || 0) + 1;
    if (j.zip) {
      const z = j.zip.slice(0, 5);
      zips[z] = zips[z] || { signed: 0, completed: 0 };
      zips[z].signed++;
      if (isCompleted(j)) zips[z].completed++;
    }
    if (j.salesRep) reps[j.salesRep] = (reps[j.salesRep] || 0) + 1;
    for (const t of (j.trades || [])) trades[t] = (trades[t] || 0) + 1;
    if (j.deductible && j.deductible > 0 && j.deductible <= 50000) deductibles.push(j.deductible);
    if (j.signedDate) {
      const y = j.signedDate.slice(0, 4);
      yearAgg[y] = yearAgg[y] || { signed: 0, completed: 0 };
      yearAgg[y].signed++;
      if (isCompleted(j)) yearAgg[y].completed++;
    }
  }
  deductibles.sort((a, b) => a - b);
  const med = deductibles[Math.floor(deductibles.length / 2)];
  const topZips = Object.entries(zips).sort((a, b) => b[1].signed - a[1].signed).slice(0, 10);
  const topReps = Object.entries(reps).sort((a, b) => b[1] - a[1]).slice(0, 8);
  const topTrades = Object.entries(trades).sort((a, b) => b[1] - a[1]).slice(0, 8);
  const years = Object.entries(yearAgg).sort((a, b) => b[0].localeCompare(a[0]));
  const recent = a.jobs.sort((x, y) => (y.signedDate || '').localeCompare(x.signedDate || '')).slice(0, 20);

  $('detail').innerHTML = `
    <h2>${a.name} · <span style="color:var(--muted);font-weight:400">${a.carrier}</span> <a class="riq-link" href="cheat-sheet.html?type=adjuster&name=${encodeURIComponent(a.name)}" style="font-size:13px;margin-left:8px">🎓 Cheat Sheet →</a></h2>
    <div class="desc">${a.signed} signed · ${a.completed} approved · ${fmt.pct(a.approvalRate)} approval rate</div>
    ${[...a.emails].length || [...a.phones].length ? `<div class="contact">
      ${[...a.emails].map((e) => `<a href="mailto:${e}">📧 ${e}</a>`).join('')}
      ${[...a.phones].map((p) => `<a href="tel:${p.replace(/\D/g, '')}">📱 ${p}</a>`).join('')}
    </div>` : ''}
    ${[...a.supervisors].length ? `<div style="color:var(--muted);font-size:12px;margin-top:4px">Supervisor(s): ${[...a.supervisors].join(', ')}</div>` : ''}

    <div class="kpi-row" style="margin-top:16px">
      <div class="kpi"><div class="label">Signed</div><div class="value">${a.signed}</div></div>
      <div class="kpi"><div class="label">Approved</div><div class="value">${a.completed}</div></div>
      <div class="kpi"><div class="label">Denied/Dead</div><div class="value">${a.dead}</div></div>
      <div class="kpi"><div class="label">Approval %</div><div class="value">${fmt.pct(a.approvalRate)}</div></div>
      <div class="kpi"><div class="label">Total revenue</div><div class="value">${fmt.money(a.revenue)}</div></div>
      <div class="kpi"><div class="label">Med deductible</div><div class="value">${fmt.money(med)}</div></div>
    </div>

    <div class="grid-2">
      <div><h2 style="font-size:13px;margin-top:0">Top ZIPs handled</h2><div class="scroll"><table>
        <thead><tr><th>ZIP</th><th class="num">Signed</th><th class="num">Approved</th></tr></thead>
        <tbody>${topZips.map(([z, s]) => `<tr><td>${z}</td><td class="num">${s.signed}</td><td class="num">${s.completed}</td></tr>`).join('')}</tbody>
      </table></div></div>
      <div><h2 style="font-size:13px;margin-top:0">Top reps working this adjuster</h2><div class="scroll"><table>
        <tbody>${topReps.map(([r, n]) => `<tr><td>${r}</td><td class="num">${n}</td></tr>`).join('')}</tbody>
      </table></div></div>
      <div><h2 style="font-size:13px;margin-top:0">Top trades</h2><div class="scroll"><table>
        <tbody>${topTrades.map(([t, n]) => `<tr><td>${t}</td><td class="num">${n}</td></tr>`).join('')}</tbody>
      </table></div></div>
      <div><h2 style="font-size:13px;margin-top:0">Year-over-year</h2><div class="scroll"><table>
        <thead><tr><th>Year</th><th class="num">Signed</th><th class="num">Approved</th></tr></thead>
        <tbody>${years.map(([y, s]) => `<tr><td>${y}</td><td class="num">${s.signed}</td><td class="num">${s.completed}</td></tr>`).join('')}</tbody>
      </table></div></div>
    </div>

    <h2 style="font-size:13px;margin-top:20px">Recent jobs (last 20)</h2>
    <div class="scroll"><table>
      <thead><tr><th>Date</th><th>Customer</th><th>City</th><th>Stage</th><th class="num">Total</th></tr></thead>
      <tbody>${recent.map((j) => `
        <tr>
          <td>${j.signedDate || '—'}</td>
          <td>${window.RIQ ? window.RIQ.custLink(j) : (j.customer || '—')}</td>
          <td>${j.city || '—'}</td>
          <td>${j.stage || '—'}</td>
          <td class="num money">${fmt.money(j.jobTotal)}</td>
        </tr>
      `).join('')}</tbody>
    </table></div>
  `;
}

async function start() {
  const res = await fetch('/api/intel/projects');
  jobs = await res.json();
  adjusters = buildAdjusters();
  $('loading').style.display = 'none';
  $('content').style.display = '';
  $('search').addEventListener('input', () => { clearTimeout(window._t); window._t = setTimeout(renderList, 200); });
  renderList();
  // Direct link support: ?name=<adjuster> opens that adjuster
  const params = new URLSearchParams(location.search);
  const target = params.get('name');
  if (target) {
    $('search').value = target;
    renderList();
    setTimeout(() => {
      const item = [...$('list').querySelectorAll('.item')].find((el) => el.textContent?.startsWith(target));
      if (item) item.click(); else $('list').querySelector('.item')?.click();
    }, 50);
  } else {
    setTimeout(() => $('list').querySelector('.item')?.click(), 50);
  }
}
start().catch((e) => { $('loading').textContent = 'Failed: ' + e; });
</script>
</body>
</html>
